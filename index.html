<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">
    <div class="card">
        <h1>My To-Do List</h1>
        <p class="subtitle">Built with DOM manipulation & event listeners</p>

        <div class="stats">
            <span>TOTAL: <b id="total-count">0</b></span>
            <span>ACTIVE: <b id="active-count">0</b></span>
            <span>COMPLETED: <b id="completed-count">0</b></span>
        </div>

        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Add a new task...">
            <button onclick="addTask()">Add Task</button>
        </div>

        <div class="filters">
            <button onclick="filterTasks(event, 'all')" class="active">ALL</button>
            <button onclick="filterTasks(event, 'active')">ACTIVE</button>
            <button onclick="filterTasks(event, 'completed')">COMPLETED</button>
        </div>

        <ul id="taskList"></ul>

        <button class="clear">Clear Completed</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
